{% extends "base.html" %}
{% block title %}Login - Workout Remixer{% endblock %}

{% block internal_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        background-color: #f5f6f8; /* Soft light grey background */
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .auth-box {
        background: #ffffff;
        padding: 40px;
        width: 350px;
        text-align: center;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.08); /* Modern soft shadow */
    }
    .auth-icon {
        font-size: 40px;
        margin-bottom: 20px;
        color: #1a1a1a;
    }
    .auth-box h2 {
        color: #1a1a1a;
        margin-bottom: 5px;
        font-weight: 800;
        letter-spacing: 1px;
    }
    .auth-form {
        display: flex;
        flex-direction: column;
        text-align: left;
    }
    .auth-form label {
        margin-top: 15px;
        font-weight: 600;
        font-size: 13px;
        color: #555;
    }
    .auth-form input {
        padding: 12px;
        margin-top: 8px;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        background-color: #fafafa;
        transition: border-color 0.2s;
    }
    .auth-form input:focus {
        outline: none;
        border-color: #1a1a1a;
    }
    .auth-btn {
        margin-top: 30px;
        padding: 12px;
        background-color: #1a1a1a; /* Stark black button */
        color: #ffffff;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s;
    }
    .auth-btn:hover {
        background-color: #333333; /* Slightly lighter on hover */
    }
    .auth-links {
        margin-top: 25px;
        font-size: 13px;
        color: #666;
    }
    .auth-links a {
        color: #1a1a1a;
        font-weight: bold;
        text-decoration: none;
    }
    .auth-links a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-icon">👤</div>
        <h2>LOGIN</h2>
        
        {% for message in get_flashed_messages(request) %}
            <div class="alert alert-danger" style="color: #d93025; background: #fce8e6; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px;">{{ message }}</div>
        {% endfor %}

        <form class="auth-form" action="/login" method="POST">
            <label>Username</label>
            <input type="text" name="username" required>
            
            <label>Password</label>
            <input type="password" name="password" required>
            
            <button type="submit" class="auth-btn">Login</button>
        </form>

        <div class="auth-links">
            Don't have an account? <a href="/register">Register</a>
        </div>
    </div>
</div>
{% endblock %}
